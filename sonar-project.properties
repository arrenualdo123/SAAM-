sonar.projectKey=SAAM-project
sonar.projectName=SAAM App
sonar.projectVersion=1.0
sonar.sources=app
sonar.exclusions=**/node_modules/**,**/*.test.js,**/*.test.jsx,**/*.test.tsx
sonar.tests=src,app
sonar.test.inclusions=**/*.test.js,**/*.test.jsx,**/*.test.tsx
# Esta línea es la más importante para ver el Coverage:
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.sourceEncoding=UTF-8